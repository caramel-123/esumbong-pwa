services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: esumbong
      POSTGRES_PASSWORD: esumbong
      POSTGRES_DB: esumbong
    ports:
      - "5432:5432"
    volumes:
      - esumbong-db-data:/var/lib/postgresql/data

volumes:
  esumbong-db-data:
